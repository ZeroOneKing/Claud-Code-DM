<svg viewBox="0 0 780 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">Mapa de Ventar — El Continente Helado</title>
  <desc id="dsc">Mapa fantástico del continente helado de Ventar: costa irregular rodeada por el Mar de Cristal al noreste, el Océano de Vapor al noroeste y el Mar del Origen al sur. Muestra la capital Glacia, el puerto de inicio Puerto Escarchado, el fuerte fronterizo Muro Gris, los reinos de Kragoroth y Glint, el dominio oculto de Veth'ira en el norte profundo, además de cordilleras, tundra, bosque de escarcha y rutas de caravanas.</desc>

  <defs>
    <style>
      .sea   { fill:#163049; }
      .land  { fill:#e6eef3; stroke:#8aa6bd; stroke-width:2.5; }
      .tundra{ fill:#d3ddd3; }
      .glacier{ fill:#bcd6e8; }
      .forest{ fill:#33524a; }
      .lake  { fill:#9fc3dc; stroke:#6f9fbf; stroke-width:1.5; }
      .road  { fill:none; stroke:#6b5340; stroke-width:3; stroke-dasharray:9 7; stroke-linecap:round; }
      .roadx { fill:none; stroke:#7a3340; stroke-width:2.5; stroke-dasharray:3 9; stroke-linecap:round; opacity:.8; }
      .cap   { font-family:Georgia,'Times New Roman',serif; }
      .lbl   { font-family:Georgia,'Times New Roman',serif; fill:#16242f; paint-order:stroke; stroke:#eef4f8; stroke-width:3.5; stroke-linejoin:round; }
      .sealbl{ font-family:Georgia,'Times New Roman',serif; fill:#bcd6ea; font-style:italic; opacity:.85; }
      .regn  { font-family:Georgia,'Times New Roman',serif; fill:#5d6b66; font-style:italic; letter-spacing:1px; }
    </style>
  </defs>

  <!-- MAR -->
  <rect class="sea" x="0" y="0" width="780" height="640"/>
  <g opacity="0.18" stroke="#7fb0d4" stroke-width="2" fill="none">
    <path d="M40 70 q30 -12 60 0 t60 0"/>
    <path d="M610 90 q30 -12 60 0 t60 0"/>
    <path d="M70 590 q30 -12 60 0 t60 0"/>
    <path d="M500 600 q30 -12 60 0 t60 0"/>
  </g>
  <!-- icebergs -->
  <g fill="#cfe2f0" opacity="0.5" stroke="#9fc3dc" stroke-width="1">
    <path d="M60 250 l14 -10 12 10 -6 9 -16 0z"/>
    <path d="M700 430 l16 -11 13 11 -7 10 -18 0z"/>
    <path d="M120 520 l11 -8 10 8 -5 7 -13 0z"/>
  </g>

  <!-- CONTINENTE (costa irregular) -->
  <path class="land" d="M250 95
    q60 -18 120 -6 q40 8 78 -4 q44 -14 84 6 q-10 30 18 44 q34 16 30 52
    q-4 30 22 46 q30 18 18 52 q-12 32 18 50 q24 14 8 46 q-16 32 -54 40
    q-46 10 -86 34 q-40 24 -92 18 q-50 -6 -96 -30 q-40 -20 -78 -16
    q-40 4 -56 -30 q-14 -30 8 -56 q22 -26 6 -56 q-16 -30 10 -54
    q26 -24 14 -56 q-12 -32 18 -54 q26 -18 24 -50 q-2 -14 22 -16z"/>

  <!-- GLACIAR (costa NO) -->
  <path class="glacier" d="M196 175 q-22 22 -8 52 q12 26 40 24 q22 -2 22 -30 q0 -34 -22 -52 q-18 -14 -32 6z"/>
  <!-- TUNDRA / LLANURA central-sur -->
  <path class="tundra" d="M300 360 q70 -24 150 -8 q60 12 96 44 q-20 40 -78 56 q-60 16 -120 -2 q-54 -16 -60 -50 q-4 -24 12 -40z"/>
  <!-- BOSQUE DE ESCARCHA (O) -->
  <path class="forest" d="M250 270 q40 -14 70 6 q22 16 6 44 q-18 30 -58 28 q-36 -2 -44 -34 q-8 -30 26 -44z" opacity="0.92"/>

  <!-- LAGO HELADO -->
  <path class="lake" d="M430 250 q26 -6 40 12 q10 18 -10 30 q-26 12 -44 -6 q-12 -22 14 -36z"/>

  <!-- CORDILLERA CIMA BLANCA (NE) -->
  <g class="cap">
    <g fill="#8a98a5" stroke="#5e6b76" stroke-width="1.5">
      <path d="M470 210 l30 -54 30 54z"/>
      <path d="M512 224 l34 -64 34 64z"/>
      <path d="M558 214 l26 -48 26 48z"/>
      <path d="M492 232 l22 -40 22 40z"/>
    </g>
    <g fill="#f3f8fb">
      <path d="M488 175 l12 -21 12 21 -12 -7z"/>
      <path d="M530 168 l16 -28 16 28 -16 -9z"/>
      <path d="M572 178 l12 -22 12 22 -12 -7z"/>
    </g>
  </g>
  <!-- montañas dispersas norte -->
  <g class="cap" fill="#94a2ae" stroke="#65727c" stroke-width="1.3">
    <path d="M330 175 l20 -34 20 34z"/>
    <path d="M360 184 l16 -28 16 28z"/>
  </g>

  <!-- BOSQUE: copas de abeto -->
  <g fill="#27433c">
    <path d="M268 286 l8 -18 8 18z"/><path d="M286 296 l9 -20 9 20z"/>
    <path d="M256 304 l8 -18 8 18z"/><path d="M300 286 l8 -16 8 16z"/>
    <path d="M278 312 l9 -19 9 19z"/>
  </g>

  <!-- ============ RUTAS ============ -->
  <!-- Ruta de caravanas: Puerto Escarchado -> Glacia -> Muro Gris -->
  <path class="road" d="M560 470 Q470 410 392 344"/>
  <path class="road" d="M392 344 Q372 268 384 206"/>
  <!-- ramales -->
  <path class="road" d="M392 344 Q300 350 232 360"/>
  <path class="road" d="M392 344 Q460 300 510 256"/>
  <!-- sendero perdido hacia el norte (oculto) -->
  <path class="roadx" d="M384 206 Q392 158 404 126"/>

  <!-- ============ LOCALIZACIONES ============ -->
  <!-- Glacia (capital) -->
  <g>
    <path d="M392 344 l7 -16 7 16 -7 -4z" fill="#f4d35e" stroke="#7a5c12" stroke-width="1.2"/>
    <circle cx="392" cy="344" r="6.5" fill="#f4d35e" stroke="#7a5c12" stroke-width="1.6"/>
    <text class="lbl" x="392" y="368" font-size="16" font-weight="bold" text-anchor="middle">Glacia</text>
    <text class="lbl" x="392" y="383" font-size="10.5" text-anchor="middle" fill="#3a4a55">★ Capital · Imperio de Kaelor</text>
  </g>
  <!-- Puerto Escarchado (inicio) -->
  <g>
    <circle cx="560" cy="470" r="6" fill="#5fa8d3" stroke="#1d3e57" stroke-width="1.8"/>
    <circle cx="560" cy="470" r="11" fill="none" stroke="#5fa8d3" stroke-width="1.4" opacity="0.7"/>
    <text class="lbl" x="560" y="494" font-size="13.5" font-weight="bold" text-anchor="middle">Puerto Escarchado</text>
    <text class="lbl" x="560" y="508" font-size="10" text-anchor="middle" fill="#3a4a55">⚓ Inicio · puerto del Mar de Cristal</text>
  </g>
  <!-- Muro Gris (fuerte) -->
  <g>
    <rect x="375" y="194" width="18" height="13" fill="#9aa6af" stroke="#4d5862" stroke-width="1.6"/>
    <path d="M375 194 l0 -5 4 0 0 5 3 0 0 -5 4 0 0 5 3 0 0 -5 4 0 0 5" fill="#9aa6af" stroke="#4d5862" stroke-width="1.2"/>
    <text class="lbl" x="384" y="182" font-size="13" font-weight="bold" text-anchor="middle">Muro Gris</text>
    <text class="lbl" x="384" y="170" font-size="9.5" text-anchor="middle" fill="#3a4a55">Último fuerte de Kaelor</text>
  </g>
  <!-- Kragoroth (Yetis) -->
  <g>
    <circle cx="546" cy="246" r="5.5" fill="#dfe7ec" stroke="#566069" stroke-width="1.6"/>
    <text class="lbl" x="582" y="250" font-size="13" font-weight="bold" text-anchor="middle">Kragoroth</text>
    <text class="lbl" x="582" y="263" font-size="9.5" text-anchor="middle" fill="#3a4a55">Yetis · Cima Blanca</text>
  </g>
  <!-- Glint (Goblins) -->
  <g>
    <circle cx="232" cy="360" r="5.5" fill="#b9c6cf" stroke="#566069" stroke-width="1.6"/>
    <text class="lbl" x="232" y="384" font-size="13" font-weight="bold" text-anchor="middle">Glint</text>
    <text class="lbl" x="232" y="397" font-size="9.5" text-anchor="middle" fill="#3a4a55">Goblins de Escarcha · Cuevas</text>
  </g>
  <!-- Veth'ira (oculto) -->
  <g>
    <circle cx="404" cy="126" r="9" fill="none" stroke="#a23145" stroke-width="1.6" stroke-dasharray="3 4"/>
    <text class="cap" x="404" y="131" font-size="14" font-weight="bold" fill="#c4445c" text-anchor="middle">?</text>
    <text class="lbl" x="404" y="108" font-size="12.5" font-style="italic" font-weight="bold" fill="#9a2538" text-anchor="middle">Veth'ira</text>
    <text class="lbl" x="404" y="95" font-size="9" text-anchor="middle" fill="#7a2230">¿Dominio de las Súcubas? (rumor)</text>
  </g>

  <!-- ============ ETIQUETAS DE REGIÓN ============ -->
  <text class="regn" x="408" y="430" font-size="12" text-anchor="middle">LLANURA HELADA</text>
  <text class="regn" x="278" y="266" font-size="10.5" text-anchor="middle">Bosque de Escarcha</text>
  <text class="regn" x="205" y="208" font-size="10" text-anchor="middle" transform="rotate(-18 205 208)">Glaciar</text>
  <text class="regn" x="528" y="300" font-size="10" text-anchor="middle">Cordillera</text>

  <!-- ============ ETIQUETAS DE MAR ============ -->
  <text class="sealbl" x="650" y="180" font-size="17" text-anchor="middle" transform="rotate(28 650 180)">Mar de Cristal</text>
  <text class="sealbl" x="118" y="110" font-size="16" text-anchor="middle" transform="rotate(-26 118 110)">Océano de Vapor</text>
  <text class="sealbl" x="390" y="600" font-size="17" text-anchor="middle">Mar del Origen</text>
  <text class="sealbl" x="712" y="120" font-size="10" text-anchor="middle" transform="rotate(28 712 120)">→ Arbolra</text>
  <text class="sealbl" x="70" y="60" font-size="10" text-anchor="middle">PartForj ←</text>

  <!-- ============ ROSA DE LOS VIENTOS ============ -->
  <g transform="translate(704 560)">
    <circle r="30" fill="#0f2536" stroke="#5fa8d3" stroke-width="1.5"/>
    <path d="M0 -26 L6 0 0 26 -6 0z" fill="#cfe2f0"/>
    <path d="M-26 0 L0 -6 26 0 0 6z" fill="#7fb0d4"/>
    <text x="0" y="-32" font-size="11" fill="#cfe2f0" text-anchor="middle" class="cap" font-weight="bold">N</text>
    <text x="0" y="42" font-size="9" fill="#9fc3dc" text-anchor="middle" class="cap">S</text>
  </g>

  <!-- ============ CARTUCHO / TÍTULO ============ -->
  <g transform="translate(40 36)">
    <rect x="-6" y="-22" width="300" height="44" rx="4" fill="#0f2536" stroke="#5fa8d3" stroke-width="1.5" opacity="0.92"/>
    <text x="144" y="-2" font-size="20" fill="#eaf3fa" text-anchor="middle" class="cap" font-weight="bold" letter-spacing="2">VENTAR</text>
    <text x="144" y="15" font-size="10.5" fill="#9fc3dc" text-anchor="middle" class="cap" font-style="italic">El Continente Helado · Año 0</text>
  </g>

  <!-- ============ LEYENDA ============ -->
  <g transform="translate(40 470)" class="cap">
    <rect x="-6" y="-14" width="186" height="150" rx="4" fill="#0f2536" stroke="#5fa8d3" stroke-width="1.2" opacity="0.92"/>
    <text x="6" y="2" font-size="11" fill="#eaf3fa" font-weight="bold">LEYENDA</text>
    <path d="M8 14 l5 -11 5 11 -5 -3z" fill="#f4d35e" stroke="#7a5c12" stroke-width="1"/>
    <text x="26" y="18" font-size="9.5" fill="#dfe9f0">Capital</text>
    <circle cx="13" cy="32" r="4" fill="#5fa8d3" stroke="#1d3e57" stroke-width="1.4"/>
    <text x="26" y="35" font-size="9.5" fill="#dfe9f0">Puerto / ciudad</text>
    <rect x="9" y="44" width="9" height="7" fill="#9aa6af" stroke="#4d5862" stroke-width="1.2"/>
    <text x="26" y="51" font-size="9.5" fill="#dfe9f0">Fuerte fronterizo</text>
    <path d="M8 64 l5 -9 5 9z" fill="#8a98a5" stroke="#5e6b76" stroke-width="1"/>
    <text x="26" y="67" font-size="9.5" fill="#dfe9f0">Montañas</text>
    <path d="M8 78 l5 -9 5 9z" fill="#27433c"/>
    <text x="26" y="82" font-size="9.5" fill="#dfe9f0">Bosque de escarcha</text>
    <rect x="9" y="90" width="9" height="7" fill="#d3ddd3"/>
    <text x="26" y="97" font-size="9.5" fill="#dfe9f0">Tundra / llanura</text>
    <path d="M8 108 h11" stroke="#6b5340" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="26" y="111" font-size="9.5" fill="#dfe9f0">Ruta de caravanas</text>
    <path d="M8 122 h11" stroke="#7a3340" stroke-width="2.5" stroke-dasharray="2 5"/>
    <text x="26" y="125" font-size="9.5" fill="#dfe9f0">Sendero perdido (¿?)</text>
  </g>
</svg>
